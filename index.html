<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* fondo base por si no carga el video */
    background: radial-gradient(circle at top, #0f0c29, #09061a 70%);
}

.wrapper{
    display:flex;
    align-items:center;
    gap:40px;
}


/* PERFIL */
.profile{
    position:relative;
    width:390px;
    height:400px; /* 👈 CLAVE */
    padding:180px 10px 30px;
    border-radius:25px;

    /* 👇 glass */
    background: rgba(93, 193, 185, 0.6);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border:1px solid rgba(21, 126, 139, 0.075);

    overflow:visible; /* 👈 IMPORTANTE */
    box-shadow:0 30px 60px rgba(0,0,0,0.7);
    color:#fff;
}

/* AVATAR */
.avatar{
    position:absolute;
    top:-45px;
    left:-178px;
    width:200px;
    height:200px;
    border-radius:50%;
    background: rgba(93, 193, 185, 0.6);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    overflow:hidden;
    border:21px solid #358a8da1;
    box-shadow:0 10px 30px rgba(0, 0, 0, 0.384);
    z-index:20;
}
.avatar img{width:100%;height:100%;object-fit:cover;}

/* MENU */
.menu{
    position:absolute;
    top:-45px;
    left:50%;
    transform:translateX(-50%);

    display:flex;
    gap:8px;
    border:1px solid rgba(112, 255, 255, 0.075);
    background: rgba(93, 193, 185, 0.6);
    backdrop-filter: blur(15px);



    padding:6px;
    border-radius:26px;
}
.menu span{
    font-size:12px;
    opacity:0.6;
    padding:6px 14px;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
}

.menu span:hover{
    background: rgba(117, 182, 202, 0.6);
    opacity:1;
}

.menu .active{
    background:linear-gradient(90deg,#46efd3,#2eb8a5);
    opacity:1;
    box-shadow:0 5px 15px rgba(51, 234, 204, 0.5);
}

.menu .active:hover{
    background:linear-gradient(90deg,#46efe1,#2eb8a5);
    opacity:1;
}
/* TEXTO */
.name{
    text-align:center;
    font-size:35px;
    position: relative;
    top:-90px;
    background:linear-gradient(90deg,#46efca,#16e2d8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.id{
    position: relative;
    top: -88px;
    font-size:12px;
    text-align:center;
    opacity:0.5;
    margin-bottom:25px;
}

/* INFO */
.info{
    position: relative;
    top: -85px;
    display:flex;
    justify-content:center;
    gap:14px;
    margin-bottom:25px;
}

/* TARJETAS */
.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border:1px solid rgba(199, 172, 243, 0.15);

    padding:10px 14px;
    border-radius:14px;

    min-width:110px;
    text-align:center;

    transition:0.3s;
}

/* HOVER PRO */
.card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(51, 228, 234, 0.25);
}

/* TITULO (remarcado) */
.card .title{
    display:block;
    font-size:11px;
    font-weight:600;
    color:#84fcd8; /* violeta */
    margin-bottom:4px;
    letter-spacing:0.5px;
}

/* SUBTITULO */
.card .sub{
    font-size:10px;
    color:#fff;
    opacity:0.9;
}

.flag{
    width:16px;
    height:12px;
    object-fit:cover;
    border-radius:2px;
    margin-right:6px;
    vertical-align:middle;
}
.info div{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);

    border:1px solid rgba(199, 172, 243, 0.15);

    padding:6px 10px;
    border-radius:12px;
    font-size:10px;
    text-align:center;
    min-width:110px;
}

/* MENSAJE */
.message{
    position: absolute;
    top: 120px;
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;
    padding:18px;
    text-align:center;
    font-size:11px;
    opacity:0.85;
}

.cursor{
    display:inline-block;
    margin-left:2px;
    animation:blink 1s infinite;
    color:#c084fc;
}

@keyframes blink{
    0%,50%,100%{opacity:1;}
    25%,75%{opacity:0;}
}

.tabs{
    position: relative;
    top:-70px;

    height:220px; /* 👈 altura fija */
    overflow:visible; /* 👈 evita que crezca */
}

.tab{
    position:absolute; /* 👈 CLAVE */
    width:100%;
    height:100%;
    top:0;
    left:0;

    display:none;
}

.tab.active{
    display:block;
}



@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* PLAYER */
.player{
    position: relative;
    top:80px;
    left:-602px;
    width:170px;
    padding:16px 15px 20px;

    border-radius:80px 80px 30px 30px;

    background: rgba(49, 126, 133, 0.6);
    backdrop-filter: blur(25px);

    border:1px solid rgba(112, 226, 255, 0.075);

    box-shadow:0 30px 60px rgba(0,0,0,0.7);
    color:#fff;
    text-align:center;
}
.player img{

    width:75px;
    height:75px;
    border-radius:50%;
    object-fit:cover;

    top:-5px;

    border:6px solid #2d8b8b;
    box-shadow:
        inset 0 0 0 6px rgba(0,0,0,0.6),
        inset 0 0 0 12px rgba(255,255,255,0.05),
        0 10px 30px rgba(0,0,0,0.5);

    position:relative;
}


.player.playing::before{
    animation-play-state: running;
}
/* centro del vinilo */
.player img::after{
    content:"";
    position:absolute;
    width:100px;
    height:100px;
    background:#a01717;
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}



@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.player img{

    animation:spin 6s linear infinite;
    animation-play-state: paused;
}

.player.playing img{
    animation-play-state: running;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
.song{
    position: relative;
    top:8px;
    font-size:10px;
    margin-bottom:15px;
}

.controls{
    position: relative;
    top:-18px;
    display:flex;
    justify-content:center;
    gap:12px;
}
.controls button{
    width:30px;
    height:30px;
    border:none;
    border-radius:50%;
    background:linear-gradient(90deg,#46dbef65,#33eabc5b);
    color:#fff;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(51, 222, 234, 0.24);
}


.progress-container{
    position: relative;
    top:-10px;
    width:100%;
    height:4px;
    background:rgba(255,255,255,0.15);
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
}

.progress{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#46cdef,#33deea);
    border-radius:10px;
    box-shadow:0 0 8px rgba(70, 205, 239, 0.8);
    transition:width 0.1s linear;
}

.wrapper{
    display:flex;
    align-items:center;
    gap:40px;
    top:20px;
    position: relative;
    left: 150px;
}

.glass{
    background: rgba(255, 255, 255, 0.08); /* transparencia */
    backdrop-filter: blur(20px); /* efecto vidrio */
    -webkit-backdrop-filter: blur(20px);

    border: 1px solid rgba(255, 255, 255, 0.15);

    box-shadow:
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.1);

    border-radius: 20px;
}


.equalizer{
    display:flex;
    justify-content:center;
    margin-top:10px;
    gap:3px;
    height:12px;
    margin-bottom:28px;
}

.equalizer span{

    width:3px;
    height:100%;
    background:#84dafc;
    border-radius:2px;
    animation:equalize 1s infinite ease-in-out;
    animation-play-state: paused;
}

.equalizer span:nth-child(2){animation-delay:0.2s;}
.equalizer span:nth-child(3){animation-delay:0.4s;}
.equalizer span:nth-child(4){animation-delay:0.6s;}

.player.playing .equalizer span{
    animation-play-state: running;
}

@keyframes equalize{
    0%,100%{height:4px;}
    50%{height:18px;}
}

.player{
    transition:0.3s;
}



/* animación al cambiar canción */
.song{
    transition:0.3s;
}

.song.change{
    opacity:0;
    transform:translateY(10px);
}

/* GRID FRIENDS */
.friends{
    display:grid;
grid-template-columns:repeat(2, 166px);
justify-content:center;
    gap:15px;
    margin-top:20px;
}

/* CARD FRIEND */
.friend{
    position: relative;
    display:flex;
    align-items:center;
    gap:10px;
    top:-90px;
    padding:12px 14px; /* 👈 mejor balance */

    border-radius:50px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:0 10px 30px rgba(0,0,0,0.4);

    transition:0.3s;
}
.friend:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 40px rgba(147,51,234,0.25);
}

/* AVATAR */
.avatar-friend{
    width:50px;
    height:50px;
    border-radius:50%;
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0; /* 👈 NO se achica */
    background:#317c88;
    border:2px solid rgba(255,255,255,0.1);

    margin-right:12px;
}

.avatar-friend img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* LETRA fallback */
.avatar-friend.letter{
    font-weight:600;
    color:#fff;
    font-size:18px;
}

/* DATA */
.data{
    flex:1;
}

.nick{
    position: relative;
    left:-20px;
    font-size:10px;
    font-weight:600;
}

.fid{
    position: relative;
    left:-20px;
    font-size:8px;
    opacity:0.6;
}

/* BOTON XAT */
.xat{
    position: relative;
    text-decoration:none;
    margin-left:auto;
    width:35px;
    height:35px;
    left:-20px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0; /* 👈 NO se achica */
    border-radius:50%;

    font-size:8px;
    color:#fff;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    border:1px solid rgba(255,255,255,0.15);

    transition:0.3s;
}

/* HOVER BOTON */
.xat:hover{
    background:linear-gradient(90deg,#3eabb39d,#33deea9f);
    box-shadow:0 0 15px rgba(70, 177, 239, 0.6);
}

/* GALERIA */
.gallery-container{
    position:absolute;
    width:106%;
    height:280px;
    top:-95px;
    left:-12px;
    margin-top:10px; /* 👈 se acomoda dentro del perfil */
    gap:80%;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow: hidden;
    perspective:1200px;
}

/* carta inicial */
.card-main{
    position:absolute;
    width:130px;
    height:190px;
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
    transition:0.6s;
    z-index:10;
    padding:6px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.082),
        0 0 20px rgba(70, 200, 239, 0.171);
}

.card-main:hover{
    transform:scale(1.05);
    box-shadow:
        0 20px 30px rgba(0, 0, 0, 0.096),
        0 0 25px rgba(70, 214, 239, 0.295);
}

/* 👇 BORDE GRADIENTE PRO */
.card-main::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:18px;
    padding:1px;

    background:linear-gradient(120deg,#46dbef8c,#33b0ea80,#60e3fa98);

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;

    pointer-events:none;
}

.card-main img{
        border-radius:18px;
    width:100%;
    height:100%;
    object-fit:cover;
}


/* carrusel oculto al inicio */
.carousel{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    display:none;
}

/* cartas */
.item{
    position:absolute;
    width:110px;
    height:150px;
    border-radius:18px;
    overflow:hidden;
    padding:6px;
    left:50%;
    top:50%;

    transform-style:preserve-3d;
    transform-origin:center;

    transition:1s;

    /* 👇 EFECTO GLASS */
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.151);
}

/* 👇 BORDE GRADIENTE PRO */
.item::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:18px;
    padding:1px;

    background:linear-gradient(120deg,#46e4ef,#33d5ea,#60a5fa);

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;

    pointer-events:none;
}

/* HOVER PRO */
.item:hover{
    transform:translate(-50%, -50%) scale(1.08) !important;

    box-shadow:
        0 20px 50px rgba(0,0,0,0.7),
        0 0 20px rgba(51, 222, 234, 0.8);
}

.item img{
    border-radius:18px;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* animacion giro */
@keyframes rotate{
    from{transform:rotateY(0deg);}
    to{transform:rotateY(360deg);}
}

.carousel.active{
    display:block;
    animation:rotate 20s linear infinite;
}

/* PANTALLA INICIAL */
.intro{
    position:fixed;
    inset:0;
    background:#1c454a;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;

    transition:1.5s ease;
}

/* BOTON */
.enter-btn{
    padding:14px 40px;
    border:none;
    border-radius:30px;
    font-size:14px;
    letter-spacing:3px;
    color:#fff;
    cursor:pointer;

    background:linear-gradient(90deg,#55f7f7,#84fcfc);
    box-shadow:0 0 25px rgba(85, 223, 247, 0.7);

    transition:0.3s;
}

.enter-btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 40px rgb(85, 196, 247);
}

/* EFECTO AL ENTRAR */
.intro.hide{
    opacity:0;
    backdrop-filter: blur(20px);
}

/* MARIPOSA */
.butterfly{
    position:absolute;
    top:-70px;
    left:-230px; /* 👈 ajustá según gusto */

    width:150px;
    pointer-events:none;

    animation:floatButterfly 4s ease-in-out infinite;
    z-index:25;
}

.butterfly img{
    width:100%;
    filter: hue-rotate(280deg) saturate(1.8) brightness(1.1);
}

/* animación flotante */
@keyframes floatButterfly{
    0%{
        transform:translate(0px, 0px) rotate(0deg);
    }
    25%{
        transform:translate(10px, -10px) rotate(5deg);
    }
    50%{
        transform:translate(0px, -20px) rotate(0deg);
    }
    75%{
        transform:translate(-10px, -10px) rotate(-5deg);
    }
    100%{
        transform:translate(0px, 0px) rotate(0deg);
    }
}
</style>

        <div class="progress" id="progress"></div>
    </div>

    <audio id="audio"></audio>
</div>

</div>

<script>
const audio = document.getElementById("audio");
const cover = document.getElementById("cover");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const progress = document.getElementById("progress");
const playBtn = document.getElementById("playBtn");
const player = document.querySelector(".player");

// 🎵 TUS CANCIONES (CAMBIÁ NOMBRES SEGÚN TU CARPETA)
const songs = [
    {
        name: "Carlos Rivera - Que lo nuestro se quede nuestro.mp3",
        title: "Que lo nuestro se quede nuestro",
        artist: "Carlos Rivera",
        cover: "album.jpg"
    }
];

let index = 0;
let playing = false;

// cargar canción
function loadSong(song){
    audio.src = "music/" + song.name;
    cover.src = "music/" + song.cover;
    title.textContent = song.title;
    artist.textContent = song.artist;
}

// play / pause
function togglePlay(){
    if(playing){
        audio.pause();
        playBtn.textContent = "▶";
        player.classList.remove("playing");
    }else{
        audio.play();
        playBtn.textContent = "⏸";
        player.classList.add("playing");
    }
    playing = !playing;
}

// siguiente
function next(){
    index++;
    if(index >= songs.length) index = 0;
    loadSong(songs[index]);
    audio.play();
    player.classList.add("playing");
    playBtn.textContent = "⏸";
    playing = true;
}

// anterior
function prev(){
    index--;
    if(index < 0) index = songs.length - 1;
    loadSong(songs[index]);
    audio.play();
    player.classList.add("playing");
    playBtn.textContent = "⏸";
    playing = true;
}

// progreso automático
audio.addEventListener("timeupdate", () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + "%";
});

// click en barra
function setProgress(e){
    const width = e.currentTarget.clientWidth;
    const clickX = e.offsetX;
    const duration = audio.duration;

    audio.currentTime = (clickX / width) * duration;
}

// autoplay
window.addEventListener("load", () => {
    loadSong(songs[index]);

    audio.volume = 0.5;

    audio.play().then(()=>{
        playing = true;
        playBtn.textContent = "⏸";
        player.classList.add("playing");
    }).catch(()=>{
        playBtn.textContent = "▶";
    });
});

// siguiente automático
audio.addEventListener("ended", next);

title.parentElement.classList.add("change");

setTimeout(()=>{
    title.parentElement.classList.remove("change");
},300);

const tabs = document.querySelectorAll('.tab');
const buttons = document.querySelectorAll('.menu span');

buttons.forEach(btn => {
    btn.addEventListener('click', () => {

        // quitar activo de botones
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // ocultar tabs
        tabs.forEach(t => t.classList.remove('active'));

        // mostrar tab correcto
        const id = btn.textContent.toLowerCase();

        if(id.includes('perfil')) document.getElementById('perfil').classList.add('active');
        if(id.includes('amigos')) document.getElementById('amigos').classList.add('active');
        if(id.includes('galería')) document.getElementById('galeria').classList.add('active');
    });
});

const text = "Cada día es un regalo,ábrelo con gratitud y úsalo con propósito";
const speed = 40; // velocidad (más bajo = más rápido)

let i = 0;
const typing = document.getElementById("typing");

function writeText(){
    if(i < text.length){
        typing.innerHTML += text.charAt(i);
        i++;
        setTimeout(writeText, speed);
    }
}

// iniciar al cargar
window.addEventListener("load", writeText);

const mainCard = document.getElementById("mainCard");
const carousel = document.getElementById("carousel");
const items = document.querySelectorAll(".item");

let opened = false;

mainCard.addEventListener("click", () => {

    if(opened) return;
    opened = true;

    // ocultar carta principal
    mainCard.style.transform = "scale(0)";
    mainCard.style.opacity = "0";

    carousel.style.display = "block";

    const total = items.length;
    const radius = 170;

// 🔥 RESET para evitar efecto hacia abajo
items.forEach(item => {
    item.style.transition = "none";
    item.style.transform = "translate(-50%, -50%) rotateY(0deg) translateZ(0px)";
});

// forzar reflow
items[0].offsetHeight;


// efecto "repartir cartas"
items.forEach((item, i) => {

    const angle = (360 / total) * i;

    setTimeout(() => {
        item.style.transition = "0.8s ease";
        item.style.transform =
            `translate(-50%, -50%) rotateY(${angle}deg) translateZ(${radius}px)`;
    }, i * 120);

});


// activar giro después de repartir
setTimeout(() => {
    carousel.classList.add("active");
}, total * 120 + 300);
});
const wrapper = document.querySelector(".wrapper");

enterBtn.addEventListener("click", () => {

    // animación intro
    intro.classList.add("hide");

    // mostrar contenido con blur
    setTimeout(() => {
        intro.style.display = "none";
        wrapper.classList.add("show");
    }, 800);

    // 🔊 reproducir música
    loadSong(songs[index]);

    audio.volume = 0.5;

    audio.play().then(() => {
        playing = true;
        playBtn.textContent = "⏸";
        player.classList.add("playing");
    }).catch(() => {
        playBtn.textContent = "▶";
    });

});

/* Bloquear clic derecho */
document.addEventListener('contextmenu', function(e){
  e.preventDefault();
});

/* Bloquear selección de texto */
document.addEventListener('selectstart', function(e){
  e.preventDefault();
});

/* Bloquear arrastrar imágenes/texto */
document.addEventListener('dragstart', function(e){
  e.preventDefault();
});

</script>

</body>
